<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HuggingFace Models Explorer</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2rem;
            color: #ffcc00;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #888;
            font-size: 0.95rem;
        }

        .chat-container {
            background: #0f0f23;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .response-area {
            min-height: 300px;
            max-height: 500px;
            overflow-y: auto;
            padding: 15px;
            background: #1a1a2e;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .response-placeholder {
            color: #666;
            font-style: italic;
        }

        .response-text {
            white-space: pre-wrap;
            line-height: 1.6;
        }

        .response-meta {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #333;
            font-size: 0.85rem;
        }

        .confidence {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-right: 15px;
        }

        .confidence-bar {
            width: 60px;
            height: 6px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
        }

        .confidence-fill {
            height: 100%;
            background: #4caf50;
            transition: width 0.3s ease;
        }

        .sources {
            color: #888;
        }

        .sources a {
            color: #64b5f6;
            text-decoration: none;
        }

        .sources a:hover {
            text-decoration: underline;
        }

        .out-of-scope {
            background: #3d2914;
            border: 1px solid #ff9800;
            border-radius: 8px;
            padding: 15px;
            color: #ffb74d;
        }

        .error-message {
            background: #3d1414;
            border: 1px solid #f44336;
            border-radius: 8px;
            padding: 15px;
            color: #ff6b6b;
        }

        .error-message a {
            color: #ff8a80;
        }

        .input-area {
            display: flex;
            gap: 10px;
        }

        #question-input {
            flex: 1;
            padding: 12px 15px;
            font-size: 1rem;
            border: 2px solid #333;
            border-radius: 8px;
            background: #1a1a2e;
            color: #e0e0e0;
            outline: none;
            transition: border-color 0.2s;
        }

        #question-input:focus {
            border-color: #ffcc00;
        }

        #submit-btn {
            padding: 12px 25px;
            font-size: 1rem;
            background: #ffcc00;
            color: #1a1a2e;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.1s, background 0.2s;
        }

        #submit-btn:hover {
            background: #ffdd33;
        }

        #submit-btn:active {
            transform: scale(0.98);
        }

        #submit-btn:disabled {
            background: #555;
            cursor: not-allowed;
        }

        #submit-btn .btn-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #1a1a2e;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
        }

        .examples {
            margin-top: 20px;
            text-align: center;
        }

        .examples-title {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }

        .example-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .example-btn {
            padding: 8px 14px;
            background: #252547;
            border: 1px solid #333;
            border-radius: 20px;
            color: #aaa;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .example-btn:hover {
            background: #353557;
            border-color: #ffcc00;
            color: #e0e0e0;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Mobile responsive fixes */
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .subtitle {
                font-size: 0.85rem;
            }

            .chat-container {
                padding: 12px;
            }

            .response-area {
                min-height: 200px;
                padding: 12px;
            }

            .input-area {
                flex-wrap: nowrap;
                gap: 8px;
            }

            #question-input {
                min-width: 0;
                font-size: 16px; /* Prevents iOS zoom on focus */
            }

            #submit-btn {
                padding: 12px 16px;
                font-size: 0.9rem;
                white-space: nowrap;
                flex-shrink: 0;
            }

            #submit-btn .btn-text {
                display: inline;
            }

            .example-buttons {
                gap: 6px;
            }

            .example-btn {
                padding: 6px 10px;
                font-size: 0.75rem;
            }
        }

        /* Ensure button doesn't overflow in loading state */
        #submit-btn {
            min-width: 60px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>HuggingFace Models Explorer</h1>
            <p class="subtitle">Ask questions about the top 100 most downloaded models</p>
        </header>

        <div class="chat-container">
            <div class="response-area" id="response-area">
                <p class="response-placeholder">Your answer will appear here. Try asking about model licenses, download counts, or task types.</p>
            </div>

            <div class="input-area">
                <input
                    type="text"
                    id="question-input"
                    placeholder="Ask about HuggingFace models..."
                    maxlength="2000"
                />
                <button id="submit-btn">Ask</button>
            </div>

            <div class="examples">
                <p class="examples-title">Try these examples:</p>
                <div class="example-buttons">
                    <button class="example-btn" data-question="What license does bert-base-uncased use?">License info</button>
                    <button class="example-btn" data-question="Which models are good for sentence similarity?">Sentence similarity</button>
                    <button class="example-btn" data-question="What are the top 5 most downloaded models?">Top models</button>
                    <button class="example-btn" data-question="Find models with MIT license">MIT license</button>
                    <button class="example-btn" data-question="Write me a Python script">Out of scope test</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const questionInput = document.getElementById('question-input');
        const submitBtn = document.getElementById('submit-btn');
        const responseArea = document.getElementById('response-area');
        const exampleBtns = document.querySelectorAll('.example-btn');

        function setButtonLoading(loading) {
            if (loading) {
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span class="btn-spinner"></span><span class="btn-text">...</span>';
            } else {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Ask';
            }
        }

        function showError(title, message, isQuotaError = false) {
            let html = `<div class="error-message">
                <strong>${escapeHtml(title)}</strong><br>
                ${escapeHtml(message)}`;
            if (isQuotaError) {
                html += `<br><br><small>Please wait a moment and try again.</small>`;
            }
            html += `</div>`;
            responseArea.innerHTML = html;
        }

        async function submitQuestion(question) {
            if (!question.trim()) return;

            // Show loading state
            setButtonLoading(true);

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ question }),
                });

                const data = await response.json();

                // Handle API errors (429, 500, etc.)
                if (!response.ok) {
                    const errorMsg = data.detail || data.message || 'Unknown error';
                    const isQuotaError = errorMsg.includes('429') || errorMsg.toLowerCase().includes('quota');
                    showError('Service Unavailable', errorMsg, isQuotaError);
                    return;
                }

                // Build response HTML
                let html = '';

                if (data.out_of_scope) {
                    html = `<div class="out-of-scope">
                        <strong>Out of Scope:</strong><br>
                        ${escapeHtml(data.answer)}
                    </div>`;
                } else {
                    html = `<div class="response-text">${escapeHtml(data.answer)}</div>`;

                    // Meta info
                    html += `<div class="response-meta">
                        <span class="confidence">
                            Confidence:
                            <span class="confidence-bar">
                                <span class="confidence-fill" style="width: ${data.confidence * 100}%"></span>
                            </span>
                            ${Math.round(data.confidence * 100)}%
                        </span>`;

                    if (data.sources && data.sources.length > 0) {
                        const sourceLinks = data.sources.map(s =>
                            `<a href="https://huggingface.co/${s}" target="_blank">${s}</a>`
                        ).join(', ');
                        html += `<br><span class="sources">Sources: ${sourceLinks}</span>`;
                    }

                    html += '</div>';
                }

                responseArea.innerHTML = html;

            } catch (error) {
                showError('Connection Error', error.message);
            } finally {
                setButtonLoading(false);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Event listeners
        submitBtn.addEventListener('click', () => {
            submitQuestion(questionInput.value);
        });

        questionInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                submitQuestion(questionInput.value);
            }
        });

        exampleBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const question = btn.dataset.question;
                questionInput.value = question;
                submitQuestion(question);
            });
        });
    </script>
</body>
</html>
